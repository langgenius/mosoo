name: Notify docs OpenAPI sync

on:
  push:
    branches: [main]
    paths:
      - apps/api/src/adapters/http/routes/public-api-route.ts
      - apps/api/src/adapters/http/routes/public-api-openapi.ts
      - apps/api/src/adapters/http/routes/public-api-openapi-components.ts
      - pkgs/contracts/src/http/public-api-core.contract.ts
      - pkgs/contracts/src/http/public-api-openapi.contract.ts
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch docs sync
        env:
          GH_TOKEN: ${{ secrets.MOSOO_DOCS_DISPATCH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "MOSOO_DOCS_DISPATCH_TOKEN is not configured; skipping docs sync dispatch."
            exit 0
          fi

          curl --fail --request POST \
            --url "https://api.github.com/repos/KurosawaGeeker/mosoo-docs/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data @- <<EOF
          {
            "event_type": "mosoo-openapi-changed",
            "client_payload": {
              "repo": "${GITHUB_REPOSITORY}",
              "ref": "${GITHUB_REF_NAME}",
              "sha": "${GITHUB_SHA}"
            }
          }
          EOF
