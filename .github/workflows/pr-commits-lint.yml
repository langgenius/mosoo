name: PR Commits Lint

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  lint-pr-commits:
    name: Validate PR commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch pull request head
        run: git fetch --no-tags origin ${{ github.event.pull_request.head.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Validate commit messages and authors
        run: bun scripts/validate-commit-range.ts ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}
