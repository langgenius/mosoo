name = "mosoo-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

[observability]
enabled = true

[observability.logs]
head_sampling_rate = 1

[observability.traces]
enabled = true
head_sampling_rate = 1

[vars]
APP_NAME = "mosoo"
WEB_ORIGIN = "http://localhost:5173"
AUTH_EMAIL_FROM = "Mosoo AUTH <auth@mosoo.ai>"
FILE_BUCKET_NAME = "mosoo-file"
SANDBOX_STATE_BUCKET_NAME = "mosoo-sandbox-state"
SANDBOX_FILE_BUCKET_LOCAL = "true"
MOSOO_APP_DEPLOYMENT_DOMAIN = "apps.localhost"

[[send_email]]
name = "AUTH_EMAIL"

[secrets]
required = [
  "BETTER_AUTH_SECRET",
  "RUNTIME_ACTION_TOKEN_SECRET",
  "VAULT_ROOT_SECRET",
  "R2_ACCESS_KEY_ID",
  "R2_SECRET_ACCESS_KEY",
  "CLOUDFLARE_ACCOUNT_ID",
  "CLOUDFLARE_API_TOKEN",
  "CLOUDFLARE_ZONE_ID",
]

[triggers]
crons = ["* * * * *"]

[[durable_objects.bindings]]
name = "DriverConnection"
class_name = "DriverConnection"

[[durable_objects.bindings]]
name = "Session"
class_name = "Session"

[[durable_objects.bindings]]
name = "ChannelConnection"
class_name = "ChannelConnection"

[[durable_objects.bindings]]
name = "Sandbox"
class_name = "Sandbox"

[[containers]]
class_name = "Sandbox"
image = "../driver/Dockerfile"
instance_type = "lite"
max_instances = 1

[[r2_buckets]]
binding = "FILE_BUCKET"
bucket_name = "mosoo-file"

[[r2_buckets]]
binding = "SANDBOX_STATE_BUCKET"
bucket_name = "mosoo-sandbox-state"

[[d1_databases]]
binding = "DB"
database_name = "mosoo"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "../../pkgs/db/drizzle"

[[queues.producers]]
binding = "API_COMMAND_QUEUE"
queue = "api-command"

[[queues.producers]]
binding = "CHANNEL_FINAL_DELIVERY_QUEUE"
queue = "channel-final-delivery"

[[queues.consumers]]
queue = "api-command"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "api-command-dlq"

[[queues.consumers]]
queue = "api-command-dlq"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 1

[[queues.consumers]]
queue = "channel-final-delivery"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "channel-final-delivery-dlq"

[env.prod]
name = "mosoo-api-prod"
workers_dev = false

# Named envs do not inherit the top-level [observability] block, so prod had no
# queryable Workers Logs (only traces). Enable logs so structured log lines
# (e.g. "closed before ready", driver/ready/socket events) are retrievable.
[env.prod.observability]
enabled = true

[env.prod.observability.logs]
enabled = true
head_sampling_rate = 1

[env.prod.observability.traces]
enabled = true
head_sampling_rate = 0.1

[env.prod.vars]
APP_NAME = "mosoo"
WEB_ORIGIN = "https://try.mosoo.ai"
AUTH_EMAIL_FROM = "Mosoo AUTH <auth@mosoo.ai>"
FILE_BUCKET_NAME = "mosoo-file"
SANDBOX_STATE_BUCKET_NAME = "mosoo-sandbox-state"
SANDBOX_FILE_BUCKET_LOCAL = "false"
MOSOO_APP_DEPLOYMENT_DOMAIN = "apps.mosoo.ai"

[[env.prod.send_email]]
name = "AUTH_EMAIL"

[env.prod.secrets]
required = [
  "BETTER_AUTH_SECRET",
  "RUNTIME_ACTION_TOKEN_SECRET",
  "VAULT_ROOT_SECRET",
  "R2_ACCESS_KEY_ID",
  "R2_SECRET_ACCESS_KEY",
  "CLOUDFLARE_ACCOUNT_ID",
  "CLOUDFLARE_API_TOKEN",
  "CLOUDFLARE_ZONE_ID",
  "GOOGLE_OAUTH_CLIENT_ID",
  "GOOGLE_OAUTH_CLIENT_SECRET",
]

[[env.prod.routes]]
zone_name = "mosoo.ai"
pattern = "try.mosoo.ai/api/*"

[[env.prod.durable_objects.bindings]]
name = "DriverConnection"
class_name = "DriverConnection"

[[env.prod.durable_objects.bindings]]
name = "Session"
class_name = "Session"

[[env.prod.durable_objects.bindings]]
name = "ChannelConnection"
class_name = "ChannelConnection"

[[env.prod.durable_objects.bindings]]
name = "Sandbox"
class_name = "Sandbox"

[[env.prod.containers]]
class_name = "Sandbox"
image = "../driver/Dockerfile"
instance_type = "basic"
max_instances = 1000

[[env.prod.r2_buckets]]
binding = "FILE_BUCKET"
bucket_name = "mosoo-file"

[[env.prod.r2_buckets]]
binding = "SANDBOX_STATE_BUCKET"
bucket_name = "mosoo-sandbox-state"

[[env.prod.d1_databases]]
binding = "DB"
database_name = "mosoo-prod"
database_id = "c851724c-2aa2-4c10-ac92-df74ae6e5dd0"
migrations_dir = "../../pkgs/db/drizzle"

[[env.prod.queues.producers]]
binding = "API_COMMAND_QUEUE"
queue = "api-command"

[[env.prod.queues.producers]]
binding = "CHANNEL_FINAL_DELIVERY_QUEUE"
queue = "channel-final-delivery"

[[env.prod.queues.consumers]]
queue = "api-command"
max_batch_size = 10
# Interactive runs dispatch inline (executionContext.waitUntil); this queue is
# the durable fallback for executionContext-less paths (replay, DO-originated).
# Drop the batch window 5s -> 2s so those paths don't eat a 5s dispatch delay.
max_batch_timeout = 2
max_retries = 5
dead_letter_queue = "api-command-dlq"

[[env.prod.queues.consumers]]
queue = "api-command-dlq"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 1

[[env.prod.queues.consumers]]
queue = "channel-final-delivery"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "channel-final-delivery-dlq"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DriverConnection", "Sandbox", "Session", "ChannelConnection"]

[[env.prod.migrations]]
tag = "v1"
new_sqlite_classes = ["DriverConnection", "Sandbox", "Session", "ChannelConnection"]
