"$schema" = "../../node_modules/wrangler/config-schema.json"

name = "mosoo-blog"
compatibility_date = "2026-06-01"

[assets]
directory = "./dist"
# Blog is fully static — 404s should serve a real 404 page, never fall back
# into the SPA shell that lives on the sibling `mosoo-web` worker.
not_found_handling = "404-page"

[env.prod]
name = "mosoo-blog-prod"
workers_dev = false

# Bind to the /blog* subpath on the shared `mosoo.ai` custom domain.
# Cloudflare matches the longest path prefix first, so this worker takes
# anything under /blog while the existing `mosoo-web` worker keeps the rest.
[[env.prod.routes]]
pattern = "mosoo.ai/blog*"
zone_name = "mosoo.ai"
