"$schema" = "../../node_modules/wrangler/config-schema.json"

name = "mosoo-web"
compatibility_date = "2026-06-01"
main = "src/worker.ts"

[assets]
directory = "./dist"
binding = "ASSETS"
# The Worker (src/worker.ts) decides SPA-fallback vs blog-404 per-path. Keep
# this set to "none" so the assets binding never fabricates a 200 — otherwise
# the binding would short-circuit blog misses with the SPA shell and reintroduce
# soft 404s on every deleted blog URL.
not_found_handling = "none"

[env.prod]
name = "mosoo-web-prod"
workers_dev = false

# Marketing landing and blog stay on the apex domain. Authenticated console
# traffic uses try.mosoo.ai so OAuth, cookies, and API calls stay same-origin.
[[env.prod.routes]]
pattern = "mosoo.ai"
custom_domain = true

[[env.prod.routes]]
pattern = "try.mosoo.ai"
custom_domain = true
